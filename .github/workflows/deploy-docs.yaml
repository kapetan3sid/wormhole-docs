name: Build and Deploy Docs to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Clone wormhole-mkdocs repo
      - name: Checkout wormhole-mkdocs repo
        uses: actions/checkout@v4
        with:
          repository: kapetan3sid/wormhole-mkdocs
          path: wormhole-mkdocs

      # 2. Checkout this repo (wormhole-docs) into wormhole-mkdocs/wormhole-docs
      - name: Checkout wormhole-docs content
        uses: actions/checkout@v4
        with:
          path: wormhole-mkdocs/wormhole-docs

      # 3. Set up Python (for mkdocs)
      - name: Set up Python 3.11.10
        uses: actions/setup-python@v4
        with:
          python-version: 3.11.10

      # 4. Install MkDocs dependencies
      - name: Install requirements
        run: pip install -r requirements.txt
        working-directory: wormhole-mkdocs

      # 5. Build the docs using mkdocs
      - name: Build documentation
        run: mkdocs build
        working-directory: wormhole-mkdocs

      # 6. Install Wrangler
      - name: Install Wrangler CLI
        run: npm install -g wrangler@4

      # 7. Deploy using Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy ./site --project-name=wormhole-docs
        working-directory: wormhole-mkdocs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
