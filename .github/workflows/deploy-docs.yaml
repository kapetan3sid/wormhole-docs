name: Deploy MkDocs to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout wormhole-mkdocs repo
        uses: actions/checkout@v4
        with:
          repository: kapetan3sid/wormhole-mkdocs
          path: wormhole-mkdocs

      - name: Checkout wormhole-docs (this repo)
        uses: actions/checkout@v4
        with:
          path: kapetan3sid/wormhole-docs

      - name: Set up Python 3.11.10
        uses: actions/setup-python@v4
        with:
          python-version: 3.11.10

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: wormhole-mkdocs

      - name: Build site with MkDocs
        run: mkdocs build
        working-directory: wormhole-mkdocs

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: wormhole-mkdocs
